name = "kalaos-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# D1 database binding.
# Set the D1_DATABASE_ID environment variable (in Cloudflare Pages / CI) to the
# UUID returned by:  wrangler d1 create kalaos-db
# Alternatively, run `npm run deploy` which creates the database automatically.
[[d1_databases]]
binding = "DB"
database_name = "kalaos-db"
database_id = "d3581d1c-68d1-4bf6-b7bc-1b4997aacdbd"
